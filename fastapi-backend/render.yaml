# FastAPI Backend - Render Configuration

services:
  - type: web
    name: dan-dashboard-fastapi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        generateValue: true
    healthCheckPath: /health
